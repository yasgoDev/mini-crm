<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CRM - Produtos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Mini CRM</h2>
      <nav>
        <a href="index.html">Início</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html" class="active">Produtos</a>
        <a href="vendas.html">Vendas</a>
      </nav>
    </aside>

    <main class="content">
      <header class="page-header">
        <h1>Produtos</h1>
        <p>Cadastre, edite e exclua produtos</p>
      </header>

      <section class="card">
        <h2>Cadastrar / Editar Produto</h2>

        <form id="formProduto">
          <input type="hidden" id="produtoId">

          <div class="grid-2">
            <div class="field">
              <label for="nomeProduto">Nome do produto</label>
              <input type="text" id="nomeProduto" required>
            </div>

            <div class="field">
              <label for="descricaoProduto">Descrição</label>
              <input type="text" id="descricaoProduto">
            </div>

            <div class="field">
              <label for="precoCusto">Preço de custo</label>
              <input type="number" id="precoCusto" step="0.01" min="0" required>
            </div>

            <div class="field">
              <label for="precoVenda">Preço de venda</label>
              <input type="number" id="precoVenda" step="0.01" min="0" required>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn primary">Salvar Produto</button>
            <button type="button" class="btn" onclick="limparFormularioProduto()">Limpar</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Produtos Cadastrados</h2>
        <div id="listaProdutos"></div>
      </section>
    </main>
  </div>

  <script src="javascript/app.js"></script>
  <script>
    iniciarPaginaProdutos();
  </script>
</body>
</html>
