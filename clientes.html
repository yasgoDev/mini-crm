<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CRM - Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Mini CRM</h2>
      <nav>
        <a href="index.html">Início</a>
        <a href="clientes.html" class="active">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="vendas.html">Vendas</a>
      </nav>
    </aside>

    <main class="content">
      <header class="page-header">
        <h1>Clientes</h1>
        <p>Cadastre, edite e encaminhe vendas para clientes existentes</p>
      </header>

      <section class="card">
        <h2>Cadastrar / Editar Cliente</h2>

        <form id="formCliente">
          <input type="hidden" id="clienteId">

          <div class="grid-2">
            <div class="field">
              <label for="nomeCliente">Nome</label>
              <input type="text" id="nomeCliente" required>
            </div>

            <div class="field">
              <label for="telefoneCliente">Telefone</label>
              <input type="text" id="telefoneCliente">
            </div>

            <div class="field">
              <label for="emailCliente">E-mail</label>
              <input type="email" id="emailCliente">
            </div>

            <div class="field">
              <label for="categoriaCliente">Categoria personalizada</label>
              <input type="text" id="categoriaCliente" placeholder="Ex: VIP, ouro, atacado, revendedora">
            </div>
          </div>

          <div class="field">
            <label for="obsCliente">Observações</label>
            <textarea id="obsCliente" rows="4"></textarea>
          </div>

          <div class="actions">
            <button type="submit" class="btn primary">Salvar Cliente</button>
            <button type="button" class="btn" onclick="limparFormularioCliente()">Limpar</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="list-top">
          <h2>Clientes Cadastrados</h2>
          <input type="text" id="buscaCliente" placeholder="Buscar cliente por nome">
        </div>

        <div id="listaClientes"></div>
      </section>
    </main>
  </div>

  <script src="javascript/app.js"></script>
  <script>
    iniciarPaginaClientes();
  </script>
</body>
</html>
