<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini CRM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Mini CRM</h2>
      <nav>
        <a href="index.html" class="active">Início</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="vendas.html">Vendas</a>
      </nav>
    </aside>

    <main class="content">
      <header class="page-header">
        <h1>Painel</h1>
        <p>Resumo geral do sistema</p>
      </header>

      <section class="cards-grid">
        <div class="card resumo">
          <h3>Total de Clientes</h3>
          <p id="totalClientes">0</p>
        </div>

        <div class="card resumo">
          <h3>Total de Produtos</h3>
          <p id="totalProdutos">0</p>
        </div>

        <div class="card resumo">
          <h3>Total de Vendas</h3>
          <p id="totalVendas">0</p>
        </div>

        <div class="card resumo">
          <h3>Faturamento</h3>
          <p id="faturamentoTotal">R$ 0,00</p>
        </div>
      </section>

      <section class="card">
        <h2>Bem-vinda ao Mini CRM</h2>
        <p>
          Use o menu lateral para cadastrar clientes, produtos e criar vendas.
        </p>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    atualizarDashboard();
  </script>
</body>
</html>
