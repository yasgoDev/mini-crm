<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendas - Mini CRM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>Mini CRM</h2>
      <nav>
        <a href="index.html">Início</a>
        <a href="clientes.html">Clientes</a>
        <a href="produtos.html">Produtos</a>
        <a href="vendas.html" class="active">Vendas</a>
      </nav>
    </aside>

    <main class="content">
      <header class="page-header">
        <h1>Vendas</h1>
        <p>Crie vendas, vincule ao cliente e gere PDF</p>
      </header>

      <section class="card">
        <h2>Criar Venda</h2>

        <form id="formVenda">
          <div class="grid-2">
            <div class="field">
              <label for="clienteVenda">Cliente</label>
              <select id="clienteVenda" required></select>
            </div>

            <div class="field">
              <label for="produtoVenda">Produto</label>
              <select id="produtoVenda" required></select>
            </div>

            <div class="field">
              <label for="quantidadeVenda">Quantidade</label>
              <input type="number" id="quantidadeVenda" min="1" value="1" required />
            </div>

            <div class="field">
              <label for="descontoVenda">Desconto</label>
              <input type="number" id="descontoVenda" min="0" step="0.01" value="0" />
            </div>
          </div>

          <div class="field">
            <label for="obsVenda">Observações da venda</label>
            <textarea id="obsVenda" rows="3"></textarea>
          </div>

          <div class="actions">
            <button type="submit" class="btn primary">Salvar Venda</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Histórico de Vendas</h2>
        <div id="listaVendas"></div>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    iniciarPaginaVendas();
  </script>
</body>
</html>
